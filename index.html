    <title>Happy Builders | Vizag Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#1F2342',
              orange: '#F08221',
              red: '#ED2024',
              gold: {
                DEFAULT: '#F7D060',
                light: '#FCEAB1',
                dark: '#E5BC42'
              },
              cream: '#FEFDF7',
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F7D060;
        background: fixed linear-gradient(180deg, #FCEAB1 0%, #F7D060 100%);
        min-height: 100vh;
      }
      .gradient-gold {
        background: linear-gradient(135deg, #F7D060 0%, #F08221 100%);
      }
      .fade-in {
        animation: fadeIn 0.5s ease-in;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* Custom utility for the brand feel - yellow tint added */
      .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(247, 208, 96, 0.4);
      }
      .section-gold {
        background-color: rgba(247, 208, 96, 0.15);
      }
    </style>
